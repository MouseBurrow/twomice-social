name: Docker
on:
  push:
    branches: [main, prod]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /home/admin/twomice
            if [ -d "services/social" ]; then
              cd services/social && git pull origin main
            else
              mkdir -p services && cd services
              git clone https://github.com/MouseBurrow/twomice-social.git social
              cd social
            fi
            if [ "${{ github.ref_name }}" = "prod" ]; then
              docker build -t ghcr.io/mouseburrow/twomice-social:prod-latest .
            else
              docker build -t ghcr.io/mouseburrow/twomice-social:test-latest .
            fi
            docker push ghcr.io/mouseburrow/twomice-social:${{ github.ref_name == 'prod' && 'prod-latest' || 'test-latest' }}
            cd /home/admin/twomice/deploy
            docker compose -f docker-compose.${{ github.ref_name == 'prod' && 'prod' || 'test' }}.yaml up -d social
