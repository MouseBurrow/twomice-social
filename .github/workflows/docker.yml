name: Docker
on:
  push:
    branches: [test]
    tags: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            BRANCH="${{ github.ref_name }}"
            if [[ "${{ github.ref_type }}" == "tag" ]]; then
              ENV_NAME="prod"
            else
              ENV_NAME="test"
            fi
            TAG="${ENV_NAME}-latest"

            cd /home/admin/twomice
            mkdir -p deploy services
            if [ ! -f deploy/.env ]; then
              echo "ENV=${TAG}" > deploy/.env
              echo "APP_ENV=${ENV_NAME}" >> deploy/.env
              echo "AUTH_DB_PASSWORD=${{ secrets.AUTH_DB_PASSWORD }}" >> deploy/.env
              echo "POST_DB_PASSWORD=${{ secrets.POST_DB_PASSWORD }}" >> deploy/.env
              echo "MODERATION_DB_PASSWORD=${{ secrets.MODERATION_DB_PASSWORD }}" >> deploy/.env
              echo "SOCIAL_DB_PASSWORD=${{ secrets.SOCIAL_DB_PASSWORD }}" >> deploy/.env
              echo "FEED_DB_PASSWORD=${{ secrets.FEED_DB_PASSWORD }}" >> deploy/.env
              echo "AUTH_DATABASE_URL=postgresql://twomice:${{ secrets.AUTH_DB_PASSWORD }}@auth-db:5432/auth" >> deploy/.env
              echo "POST_DATABASE_URL=postgresql://twomice:${{ secrets.POST_DB_PASSWORD }}@post-db:5432/post" >> deploy/.env
              echo "MODERATION_DATABASE_URL=postgresql://twomice:${{ secrets.MODERATION_DB_PASSWORD }}@moderation-db:5432/moderation" >> deploy/.env
              echo "SOCIAL_DATABASE_URL=postgresql://twomice:${{ secrets.SOCIAL_DB_PASSWORD }}@social-db:5432/social" >> deploy/.env
              echo "FEED_DATABASE_URL=postgresql://twomice:${{ secrets.FEED_DB_PASSWORD }}@social-feed-db:5432/social_feed" >> deploy/.env
            fi
            if ! command -v cargo &> /dev/null; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
              . "$HOME/.cargo/env"
            fi
            . "$HOME/.cargo/env"
            if [ -d "services/social" ]; then
              cd services/social
              git fetch origin
              git checkout "$BRANCH"
              git pull origin "$BRANCH"
            else
              mkdir -p services && cd services
              git clone --branch "$BRANCH" https://github.com/MouseBurrow/twomice-social.git social
              cd social
            fi

            if [[ "$ENV_NAME" == "prod" ]]; then
              sed -i 's/branch = "main"/tag = "stable"/' Cargo.toml
            elif [[ "$ENV_NAME" == "test" ]]; then
              sed -i 's/branch = "main"/branch = "test"/' Cargo.toml
            fi

            cargo build --release
            mkdir -p /tmp/docker-build
            cp target/release/social /tmp/docker-build/service
            cp Dockerfile /tmp/docker-build/
            cd /tmp/docker-build
            docker build -t ghcr.io/mouseburrow/twomice-social:$TAG .
            docker push ghcr.io/mouseburrow/twomice-social:$TAG
            rm -rf /tmp/docker-build
            cd /home/admin/twomice/deploy
            docker compose -f docker-compose.${ENV_NAME}.yaml up -d social
